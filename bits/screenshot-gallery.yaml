Name: screenshot-gallery
CSS: |
  [data-bit="screenshot-gallery"] {
    padding: 60px 20px;
    max-width: 1200px;
    margin: 0 auto;
  }
  [data-bit="screenshot-gallery"] h2 {
    color: var(--text-primary);
    font-size: 42px;
    font-weight: 800;
    margin: 0 0 40px 0;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  [data-bit="screenshot-gallery"] h2::after {
    content: '';
    display: block;
    width: 80px;
    height: 4px;
    background: var(--accent);
    margin: 20px auto 0;
    box-shadow: 0 0 10px var(--accent-glow);
  }
  [data-bit="screenshot-gallery"] .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
    gap: 30px;
    margin-top: 40px;
  }
  [data-bit="screenshot-gallery"] .item {
    background: var(--bg-secondary);
    border: 2px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: all 0.3s ease;
    cursor: pointer;
  }
  [data-bit="screenshot-gallery"] .item:hover {
    transform: translateY(-8px);
    border-color: var(--accent);
    box-shadow: 0 12px 40px var(--accent-glow);
  }
  [data-bit="screenshot-gallery"] .item img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    display: block;
  }
  [data-bit="screenshot-gallery"] .item-info {
    padding: 20px;
  }
  [data-bit="screenshot-gallery"] .item-title {
    color: var(--text-primary);
    font-size: 20px;
    font-weight: 700;
    margin: 0 0 8px 0;
  }
  [data-bit="screenshot-gallery"] .item-desc {
    color: var(--text-secondary);
    font-size: 14px;
    line-height: 1.6;
  }
  [data-bit="screenshot-gallery"] .item-badge {
    display: inline-block;
    padding: 4px 12px;
    background: var(--accent);
    color: white;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 10px;
  }
JS: |
  const { container, config } = ctx;
  
  if (config.title) {
    const title = document.createElement('h2');
    title.textContent = config.title;
    container.appendChild(title);
  }
  
  const gallery = document.createElement('div');
  gallery.className = 'gallery';
  
  const items = config.items || [];
  items.forEach(item => {
    const itemDiv = document.createElement('div');
    itemDiv.className = 'item';
    
    const img = document.createElement('img');
    img.src = item.image;
    img.alt = item.title || '';
    img.loading = 'lazy';
    
    const info = document.createElement('div');
    info.className = 'item-info';
    
    const itemTitle = document.createElement('div');
    itemTitle.className = 'item-title';
    itemTitle.textContent = item.title || '';
    
    const itemDesc = document.createElement('div');
    itemDesc.className = 'item-desc';
    itemDesc.textContent = item.description || '';
    
    info.appendChild(itemTitle);
    info.appendChild(itemDesc);
    
    if (item.badge) {
      const badge = document.createElement('span');
      badge.className = 'item-badge';
      badge.textContent = item.badge;
      info.appendChild(badge);
    }
    
    itemDiv.appendChild(img);
    itemDiv.appendChild(info);
    gallery.appendChild(itemDiv);
  });
  
  container.appendChild(gallery);
