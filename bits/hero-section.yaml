Name: hero-section
CSS: |
  [data-bit="hero-section"] {
    position: relative;
    min-height: 70vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
    overflow: hidden;
    padding: 60px 20px;
  }
  [data-bit="hero-section"]::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: radial-gradient(circle at 50% 50%, var(--accent-glow) 0%, transparent 70%);
    opacity: 0.3;
    animation: pulse 4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.4; }
  }
  [data-bit="hero-section"] .content {
    position: relative;
    z-index: 1;
    text-align: center;
    max-width: 900px;
  }
  [data-bit="hero-section"] h1 {
    color: var(--text-primary);
    font-size: 72px;
    font-weight: 900;
    margin: 0 0 20px 0;
    text-shadow: 0 0 20px var(--accent-glow);
    letter-spacing: -2px;
  }
  [data-bit="hero-section"] .highlight {
    color: var(--accent);
    text-shadow: 0 0 30px var(--accent-glow);
  }
  [data-bit="hero-section"] .subtitle {
    color: var(--text-secondary);
    font-size: 24px;
    margin: 0 0 30px 0;
    font-weight: 300;
  }
  [data-bit="hero-section"] .author {
    color: var(--accent);
    font-size: 20px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 40px;
  }
  [data-bit="hero-section"] .cta-button {
    display: inline-block;
    padding: 16px 40px;
    background: var(--accent);
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-weight: 700;
    font-size: 18px;
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px var(--accent-glow);
    border: 2px solid var(--accent);
  }
  [data-bit="hero-section"] .cta-button:hover {
    background: var(--accent-dark);
    transform: translateY(-3px);
    box-shadow: 0 8px 30px var(--accent-glow);
  }
JS: |
  const { container, config } = ctx;
  const content = document.createElement('div');
  content.className = 'content';
  
  const h1 = document.createElement('h1');
  const titleText = config.title || 'Dionysus';
  const parts = titleText.split(' ');
  h1.innerHTML = parts.map((part, i) => 
    i === 0 ? `<span class="highlight">${part}</span>` : part
  ).join(' ');
  
  const subtitle = document.createElement('div');
  subtitle.className = 'subtitle';
  subtitle.textContent = config.subtitle || '';
  
  const author = document.createElement('div');
  author.className = 'author';
  author.textContent = config.author || '';
  
  content.appendChild(h1);
  content.appendChild(subtitle);
  content.appendChild(author);
  
  if (config.ctaText && config.ctaUrl) {
    const cta = document.createElement('a');
    cta.className = 'cta-button';
    cta.href = config.ctaUrl;
    cta.target = '_blank';
    cta.textContent = config.ctaText;
    content.appendChild(cta);
  }
  
  container.appendChild(content);
